<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Not Evil: Contact Page</title>

    <link rel="stylesheet" href="styles/styles.css">
</head>
<body>
    <header class="site-header">
        <div class="site-logo">
            <img src="images/not-evil-logo.png" 
                alt="Not Evil company Logo, created by Alfred.">
            <h1>Not Evil</h1>
        </div>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="main-content">
        <section class="section">
            <h2>Contact Us</h2>
            <form class="contact-form" action="#" method="post">
                <div class="form-group">
                    <label for="name">Your Name*</label>
                    <input
                        type="text"
                        id="name"
                        placeholder="John Doe"
                        autocomplete="name"
                        required/>
                </div>
                <div class="form-group">
                    <label for="email">Your Email*</label>
                    <input 
                        type="email"
                        id="email"
                        placeholder="John.Doe@email.com"
                        autocomplete="email"
                        required/>
                </div>
                <div class="form-group">
                    <label for="address">Your Location</label>
                    <input 
                        type="text"
                        id="address"
                        placeholder="59°04'43.1'N 84°46'25.3'W"
                        autocomplete="street-address"/>
                </div>
                <div class="form-group">
                    <label for="message">Your Message*</label>
                    <textarea 
                        name="message" rows="6" 
                        placeholder="Ways we can improve your life..."
                        required
                    ></textarea>
                </div>

                <button type="submit">Submit</button>
            </form>
        </section>
    </main>
    
    <footer class="site-footer">
        <p>Created by Alfred Fantone</p>
        <p>
            Follow us on 
            <a href="#">Facebook</a>,
            <a href="#">Twitter</a>,
            <a href="#">Instagram</a>,
            <a href="#">MySpace</a>, and
            <a href="#">Google+</a>.
        </p>
    </footer>
</body>
</html>
